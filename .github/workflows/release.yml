name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GATEWAY_IMAGE: ghcr.io/j0x7c4/kimi-agent-gateway
  SANDBOX_IMAGE: ghcr.io/j0x7c4/kimi-agent-sandbox

jobs:
  release:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Gateway ----
      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:latest
            ${{ env.GATEWAY_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      # ---- Sandbox ----
      - name: Build and push sandbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: true
          tags: |
            ${{ env.SANDBOX_IMAGE }}:latest
            ${{ env.SANDBOX_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      # ---- GitHub Release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Pull pre-built images (no local build required):

            ```bash
            docker pull ${{ env.GATEWAY_IMAGE }}:${{ github.ref_name }}
            docker pull ${{ env.SANDBOX_IMAGE }}:${{ github.ref_name }}
            ```

            ## Quick Start

            ```bash
            # 1. Download config files
            curl -O https://raw.githubusercontent.com/j0x7c4/OpenKimo/${{ github.ref_name }}/docker-compose.yml
            curl -O https://raw.githubusercontent.com/j0x7c4/OpenKimo/${{ github.ref_name }}/.env.example
            cp .env.example .env

            # 2. Set your API key in .env
            # 3. Start (pulls images automatically)
            docker compose up -d
            ```

  build-macos:
    name: Build macOS .app DMG
    runs-on: macos-latest   # ARM64 (M-series) runner
    permissions:
      contents: write       # upload release assets

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install venvstacks uv

      - name: Cache venvstacks layers
        uses: actions/cache@v4
        with:
          path: |
            packaging/.build
            packaging/wheels
          key: ${{ runner.os }}-${{ runner.arch }}-venvstacks-${{ hashFiles('packaging/venvstacks.toml', 'packaging/venvstacks.resolved.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-venvstacks-

      - name: Build .app + DMG
        run: |
          cd packaging
          python build.py --version "${GITHUB_REF_NAME#v}"

      - name: Verify DMG was produced
        run: |
          ls -lh dist/*.dmg
          test -n "$(ls dist/*.dmg 2>/dev/null)" || { echo '::error::No DMG found under dist/'; exit 1; }

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true

  build-macos-intel:
    name: Build macOS .app DMG (Intel x86_64)
    runs-on: macos-13   # last Intel runner from GitHub Actions
    permissions:
      contents: write       # upload release assets

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install venvstacks uv

      - name: Cache venvstacks layers
        uses: actions/cache@v4
        with:
          path: |
            packaging/.build
            packaging/wheels
          key: ${{ runner.os }}-${{ runner.arch }}-venvstacks-${{ hashFiles('packaging/venvstacks.toml', 'packaging/venvstacks.resolved.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-venvstacks-

      - name: Build .app + DMG
        run: |
          cd packaging
          python build.py --arch x86_64 --version "${GITHUB_REF_NAME#v}"

      - name: Verify DMG was produced
        run: |
          ls -lh dist/*.dmg
          test -n "$(ls dist/*.dmg 2>/dev/null)" || { echo '::error::No DMG found under dist/'; exit 1; }

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true

  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # build_windows.py prints box-drawing chars and © via Python's default
      # stdout encoding, which is cp1252 on Windows and rejects non-ASCII.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # uv: build kimi-cli wheel
          # pyinstaller: freeze the launcher .exe
          # pillow: generate_ico converts packaging/icon.png -> .ico (host-side)
          # pystray: required by pyinstaller's --collect-submodules pystray for
          # the launcher build; without it PyInstaller errors out.
          python -m pip install uv pyinstaller pillow pystray

      - name: Install Inno Setup
        shell: pwsh
        # The build script's find_iscc() searches PATH then falls back to
        # "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" — exactly where the
        # chocolatey package lands. windows-latest ships choco preinstalled.
        run: choco install innosetup --no-progress -y

      - name: Cache packaging artifacts
        uses: actions/cache@v4
        with:
          path: |
            packaging/.cache
            build/runtime-staging
          key: ${{ runner.os }}-${{ runner.arch }}-winpkg-${{ hashFiles('packaging/requirements-windows.txt', 'packaging/build_windows.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-winpkg-

      - name: Build installer .exe
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          cd packaging
          python build_windows.py --version $version

      - name: Verify installer was produced
        shell: pwsh
        run: |
          Get-ChildItem dist-win/*.exe
          if (-not (Get-ChildItem dist-win/*.exe -ErrorAction SilentlyContinue)) {
            Write-Error "No .exe found under dist-win/"
            exit 1
          }

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-win/*.exe
          fail_on_unmatched_files: true
