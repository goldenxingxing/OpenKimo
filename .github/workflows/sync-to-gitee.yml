name: Sync to Gitee

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* release tag to synchronize
        required: true
        type: string
  push:
    branches: [main]
    tags:
      - 'v*'
  delete:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  mirror:
    if: github.event_name == 'push' || github.event_name == 'delete'
    concurrency:
      group: gitee-git-mirror
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Git repository
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GIT_TERMINAL_PROMPT: '0'
        run: |
          git clone --mirror https://github.com/goldenxingxing/OpenKimo.git mirror.git
          cd mirror.git
          git remote set-url --push origin https://gitee.com/qunwei/OpenKimo.git
          git config credential.helper \
            '!f() { test "$1" = get && echo username=qunwei && echo "password=$GITEE_ACCESS_TOKEN"; }; f'
          git for-each-ref --format='delete %(refname)' refs/pull |
            git update-ref --stdin
          git push --mirror

  sync-release:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      startsWith(inputs.tag, 'v')) ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v'))
    concurrency:
      group: gitee-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      - name: Synchronize Gitee Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITEE_REPOSITORY: qunwei/OpenKimo
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
        run: python3 .github/scripts/sync_gitee_release.py --tag "$RELEASE_TAG"
